<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Curacao Karte</title>
    <link rel="stylesheet" href="https://cloudflare.com" />
    <style>
        body, html, #map { margin: 0; padding: 0; height: 100vh; width: 100vw; background: #333; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://cloudflare.com"></script>
    <script>
        function startMap() {
            if (typeof L !== 'undefined') {
                // Karte initialisieren
                var map = L.map('map', {scrollWheelZoom: false}).setView([12.2433, -69.0580], 12);
                
                // Wir nutzen jetzt Google Hybrid (Satellit + Straßen) - das lädt fast immer
                L.tileLayer('https://{s}://{x}&y={y}&z={z}', {
                    maxZoom: 20,
                    subdomains:['mt0','mt1','mt2','mt3'],
                    attribution: 'Google Maps'
                }).addTo(map);

                // Dein Haus-Marker (Rot)
                var redIcon = L.icon({
                    iconUrl: 'https://githubusercontent.com',
                    shadowUrl: 'https://cloudflare.com',
                    iconSize: [25, 41],
                    iconAnchor: [12, 41]
                });

                L.marker([12.2433, -69.0580], {icon: redIcon}).addTo(map)
                    .bindPopup("<b>🏡 CAS IGUANA</b><br>Dein Urlaubsparadies").openPopup();
                
                // Zwingt die Karte zur Anzeige
                setTimeout(function() { map.invalidateSize(); }, 500);
            } else {
                setTimeout(startMap, 100);
            }
        }
        startMap();
    </script>
</body>
</html>
