<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Curacao Karte</title>
    <link rel="stylesheet" href="https://cloudflare.com" />
    <style>
        body, html, #map { margin: 0; padding: 0; height: 100vh; width: 100vw; background: #aad3df; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://cloudflare.com"></script>
    <script>
        window.onload = function() {
            // Wir starten etwas weiter weg (Zoom 13), um Fontein und Umgebung zu sehen
            var map = L.map('map', {scrollWheelZoom: false}).setView([12.2433, -69.0580], 13);

            // Wir probieren den Wikimedia-Server (oft schneller & weniger blockiert)
            L.tileLayer('https://wikimedia.org{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            // Falls Wikimedia auch blockiert wird, laden wir OSM als Backup
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // Ein einfacher Marker für CAS IGUANA
            L.marker([12.2433, -69.0580]).addTo(map)
                .bindPopup("<b>🏡 CAS IGUANA</b>")
                .openPopup();

            // Zwingt die Karte zur Anzeige
            setTimeout(function() {
                map.invalidateSize();
            }, 1000);
        };
    </script>
</body>
</html>
