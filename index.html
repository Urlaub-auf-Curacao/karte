<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Karte</title>
    <link rel="stylesheet" href="https://cloudflare.com" />
    <style>
        body, html, #map { margin: 0; padding: 0; height: 100vh; width: 100vw; background: orange; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://cloudflare.com"></script>
    <script>
        window.onload = function() {
            try {
                var map = L.map('map').setView([12.2433, -69.0580], 12);
                
                // Wir nehmen einen anderen Karten-Server (Esri)
                L.tileLayer('https://arcgisonline.com{z}/{y}/{x}', {
                    attribution: 'Esri'
                }).addTo(map);

                L.marker([12.2433, -69.0580]).addTo(map).bindPopup("CAS IGUANA").openPopup();
                
                console.log("Karte geladen");
            } catch (e) {
                document.body.innerHTML = "<h1 style='color:white; padding:20px;'>Fehler beim Laden der Karte: " + e.message + "</h1>";
            }
        };
    </script>
</body>
</html>
