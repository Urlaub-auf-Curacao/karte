<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Curacao Karte</title>
    <!-- CSS für das Aussehen -->
    <link rel="stylesheet" href="https://cloudflare.com" />
    <style>
        body, html, #map { margin: 0; padding: 0; height: 100vh; width: 100vw; background: #333; }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Das Programm (JS) wird hier geladen -->
    <script src="https://cloudflare.com"></script>
    
    <script>
        // Diese Funktion prüft, ob das Programm (L) bereit ist
        function startMap() {
            if (typeof L !== 'undefined') {
                var map = L.map('map', {scrollWheelZoom: false}).setView([12.2433, -69.0580], 12);
                
                L.tileLayer('https://arcgisonline.com{z}/{y}/{x}', {
                    attribution: 'Esri'
                }).addTo(map);

                // Dein Haus-Marker
                L.marker([12.2433, -69.0580]).addTo(map).bindPopup("<b>🏡 CAS IGUANA</b>").openPopup();
                
                // Falls das Fenster beim Start noch nicht fertig berechnet war
                setTimeout(function() { map.invalidateSize(); }, 500);
            } else {
                // Wenn L noch nicht da ist, warte 0,1 Sekunde und versuche es erneut
                setTimeout(startMap, 100);
            }
        }

        // Startet die Prüfung
        startMap();
    </script>
</body>
</html>
