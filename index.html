<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cloudflare.com" />
    <style>
        body, html, #map { margin: 0; padding: 0; height: 100vh; width: 100vw; background: #aad3df; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://cloudflare.com"></script>
    <script>
        window.onload = function() {
            var map = L.map('map').setView([12.18, -68.98], 11);

            // Wir nutzen KEINE Hintergrundbilder, sondern eine einfache Farbe
            // Das MUSS funktionieren, wenn das Skript lädt.
            L.tileLayer('', { attribution: 'Test Modus' }).addTo(map);

            // Ein einfacher blauer Kreis für CAS IGUANA
            L.circle([12.2433, -69.0580], {
                color: 'red',
                fillColor: '#f03',
                fillOpacity: 0.5,
                radius: 1000
            }).addTo(map).bindPopup("CAS IGUANA");

            setTimeout(function() { map.invalidateSize(); }, 500);
        };
    </script>
</body>
</html>
