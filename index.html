

<style>

  .vocab-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px 12px; cursor: pointer; transition: all 0.15s; text-align: center; position: relative; }
  .vocab-card:hover { border-color: var(--color-border-secondary); background: var(--color-background-secondary); }

  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .quiz-option { padding: 10px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); font-family: 'Sora', sans-serif; font-size: 13px; color: var(--color-text-primary); cursor: pointer; transition: all 0.15s; text-align: center; }
  .quiz-option:hover:not(:disabled) { background: var(--color-background-secondary); }
  .quiz-option.correct { background: var(--color-background-success); color: var(--color-text-success); border-color: transparent; }
  .quiz-option.wrong { background: var(--color-background-danger); color: var(--color-text-danger); border-color: transparent; }
  .quiz-feedback { margin-top: 1rem; font-size: 14px; font-weight: 500; min-height: 22px; }

  .phrase-cat-header {

    user-select: none;

  .phrase-cat-header .cat-icon { font-size: 16px; }

  .phrase-cat-header.open .chevron { transform: rotate(90deg); }

  .phrase-block { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }

  .speaking-wave.active { display: flex; }
  .speaking-wave span { width: 3px; background: var(--color-text-info); border-radius: 2px; animation: wave 0.8s ease-in-out infinite; }
  .speaking-wave span:nth-child(1) { height: 6px; animation-delay: 0s; }
  .speaking-wave span:nth-child(2) { height: 12px; animation-delay: 0.1s; }
  .speaking-wave span:nth-child(3) { height: 16px; animation-delay: 0.2s; }
  .speaking-wave span:nth-child(4) { height: 10px; animation-delay: 0.3s; }
  .speaking-wave span:nth-child(5) { height: 6px; animation-delay: 0.4s; }
  @keyframes wave { 0%, 100% { transform: scaleY(0.5); } 50% { transform: scaleY(1); } }
  .tts-status { font-size: 11px; color: var(--color-text-tertiary); text-align: center; margin-bottom: 6px; }
  .progress-bar { height: 3px; background: var(--color-background-secondary); border-radius: 2px; margin-bottom: 1rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--color-text-info); border-radius: 2px; transition: width 0.3s; }
</style>

  <div class="tab-bar">

    <button class="tab-btn" onclick="showTab('quiz',this)">Quiz</button>

const phraseCategories = [
  {

    phrases: [
      { pap: "Mi ta bon, danki.", de: "Mir geht's gut, danke." },

      { pap: "Mi ta di Alemania.", de: "Ich komme aus Deutschland." },
      { pap: "Te mira!", de: "Bis bald!" },
      { pap: "Ayudo mi, por fabor!", de: "Bitte hilf mir!" },
    ]
  },
  {
    icon: "🍽️",
    title: "Restaurant",
    phrases: [
      { pap: "Un mesa pa dos persona, por fabor.", de: "Einen Tisch für zwei Personen, bitte." },
      { pap: "Por mi haña e menu, por fabor?", de: "Kann ich die Speisekarte haben, bitte?" },
      { pap: "Kiko bo ta rekumendá?", de: "Was empfehlen Sie?" },

      { pap: "Mi ta alérghiko na ...", de: "Ich bin allergisch gegen ..." },

let allWords = [];
Object.values(vocab).forEach(arr => allWords.push(...arr));

let quizIndex = 0, score = 0, totalAnswered = 0, answered = false;
let quizOrder = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function speak(text, waveId) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'es-419';
  utter.rate = 0.85;
  utter.pitch = 1;
  const wave = document.getElementById(waveId || 'wave');
  utter.onstart = () => { if (wave) wave.classList.add('active'); };
  utter.onend = () => { if (wave) wave.classList.remove('active'); };
  utter.onerror = () => { if (wave) wave.classList.remove('active'); };
  window.speechSynthesis.speak(utter);
}

function renderVocab() {
  const c = document.getElementById('vocab-container');
  c.innerHTML = '';
  for (const [cat, words] of Object.entries(vocab)) {
    const lbl = document.createElement('div');
    lbl.className = 'category-label';
    lbl.textContent = cat;
    c.appendChild(lbl);
    const grid = document.createElement('div');
    grid.className = 'vocab-grid';
    words.forEach(w => {
      const card = document.createElement('div');
      card.className = 'vocab-card';
      card.innerHTML = `
        <button class="speak-btn" onclick="event.stopPropagation();speak('${w.pap.replace(/'/g,"\\'")}','wave')">▶</button>
        <div class="pap-word">${w.pap}</div>
        <div class="de-word">${w.de}</div>
      `;
      card.onclick = () => speak(w.pap, 'wave');
      grid.appendChild(card);
    });
    c.appendChild(grid);
  }
}

function renderPhrases() {
  const c = document.getElementById('phrases-container');
  c.innerHTML = '';
  phraseCategories.forEach((cat, ci) => {
    const header = document.createElement('div');
    header.className = 'phrase-cat-header open';
    header.innerHTML = `<span class="cat-icon">${cat.icon}</span><span class="cat-title">${cat.title}</span><span class="chevron">▶</span>`;
    const group = document.createElement('div');
    group.className = 'phrase-group';
    group.id = 'pg-' + ci;
    cat.phrases.forEach(p => {
      const block = document.createElement('div');
      block.className = 'phrase-block';
      const safeText = p.pap.replace(/'/g,"\\'").replace(/"/g,'&quot;');
      block.innerHTML = `
        <div>
          <div class="pap">${p.pap}</div>
          <div class="de">${p.de}</div>
        </div>
        <button class="speak-big" onclick="speak('${safeText}','wave2')">▶</button>
      `;
      group.appendChild(block);
    });
    header.onclick = () => {
      const open = header.classList.toggle('open');
      group.style.display = open ? 'block' : 'none';
    };
    c.appendChild(header);
    c.appendChild(group);
  });
}

function startQuiz() {
  quizOrder = shuffle(allWords);
  quizIndex = 0; score = 0; totalAnswered = 0;
  document.getElementById('score-val').textContent = 0;
  document.getElementById('total-val').textContent = 0;
  renderQuestion();
}

function renderQuestion() {
  if (quizIndex >= quizOrder.length) quizIndex = 0;
  answered = false;
  const q = quizOrder[quizIndex];
  document.getElementById('quiz-word').textContent = q.pap;
  document.getElementById('quiz-feedback').textContent = '';
  const pct = Math.round((quizIndex / quizOrder.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  const others = shuffle(allWords.filter(w => w.de !== q.de)).slice(0, 3);
  const options = shuffle([q, ...others]);
  const cont = document.getElementById('quiz-options');
  cont.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt.de;
    btn.onclick = () => checkAnswer(btn, opt.de, q.de, q.pap);
    cont.appendChild(btn);
  });
}

function checkAnswer(btn, chosen, correct, pap) {
  if (answered) return;
  answered = true;
  totalAnswered++;
  document.querySelectorAll('.quiz-option').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });
  if (chosen === correct) {
    score++;
    btn.classList.add('correct');
    document.getElementById('quiz-feedback').textContent = '✓ Richtig!';
    document.getElementById('quiz-feedback').style.color = 'var(--color-text-success)';
    speak(pap, 'wave');
  } else {
    btn.classList.add('wrong');
    document.getElementById('quiz-feedback').textContent = '✗ Falsch – richtig: ' + correct;
    document.getElementById('quiz-feedback').style.color = 'var(--color-text-danger)';
  }
  document.getElementById('score-val').textContent = score;
  document.getElementById('total-val').textContent = totalAnswered;
}

function nextQuestion() { quizIndex++; renderQuestion(); }

function showTab(name, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (el) el.classList.add('active');
  if (name === 'quiz') startQuiz();
}

renderVocab();
renderPhrases();
</script>
